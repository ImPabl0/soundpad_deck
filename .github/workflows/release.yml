name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-server:
    name: Build Windows Server
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build

      - name: Build server (Release)
        run: cmake --build build --config Release --target soundpad_deck

      - name: Package server binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null

          $candidates = @(
            "build/Release/soundpad_deck.exe",
            "build/soundpad_deck.exe"
          )

          $binary = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $binary) {
            throw "Server binary not found in expected locations."
          }

          Compress-Archive -Path $binary -DestinationPath "dist/soundpad-server-windows-x64.zip" -Force

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: soundpad-server-windows-x64
          path: dist/soundpad-server-windows-x64.zip

  build-android:
    name: Build Flutter Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Flutter dependencies
        working-directory: app
        run: flutter pub get

      - name: Build APK (Release)
        working-directory: app
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: soundpad-deck-android-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-server
      - build-android
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/*.zip
            release-assets/*.apk
